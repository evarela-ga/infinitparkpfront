<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="i18n.js"></script>
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#0D1B2A}
  input::placeholder{color:#56708a}
  input:focus{border-color:#29ABE2 !important}
  @keyframes waveMove{from{transform:translateX(0)}to{transform:translateX(-50%)}}
</style>
</helmet>

<div style="font-family:Inter,system-ui,sans-serif;min-height:100vh;background:linear-gradient(135deg,#0D1B2A,#1A3A5C);display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden">
  <div style="position:absolute;left:0;right:0;bottom:0;height:40%;pointer-events:none;opacity:.5">
    <div style="position:absolute;bottom:0;left:0;width:200%;height:100%;animation:waveMove 15s linear infinite"><svg viewBox="0 0 2880 200" width="100%" height="100%" preserveAspectRatio="none"><path d="M0,70 C200,120 340,20 720,70 C1100,120 1240,20 1440,70 C1640,120 1780,20 2160,70 C2540,120 2680,20 2880,70 L2880,200 L0,200 Z" fill="#29ABE2" opacity="0.14"/></svg></div>
  </div>

  <div style="position:relative;z-index:2;width:100%;max-width:420px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:40px;backdrop-filter:blur(14px);box-shadow:0 24px 60px rgba(0,0,0,.4)">
    <div style="text-align:center;margin-bottom:30px">
      <img src="uploads/logo-waterpark-6e0a2071.png" alt="Infinito Water Park" style="height:48px;filter:brightness(0) invert(1);margin-bottom:18px">
      <h1 style="margin:0;font-family:Poppins,sans-serif;font-weight:700;font-size:20px;color:#fff">Panel de Administración</h1>
      <p style="margin:6px 0 0;color:rgba(255,255,255,.5);font-size:13.5px">Acceso restringido al personal autorizado</p>
    </div>
    <label style="display:flex;flex-direction:column;gap:7px;margin-bottom:16px"><span style="font-size:13px;font-weight:600;color:rgba(255,255,255,.7)">Email</span><input value="admin@infinitowaterpark.com" style="padding:13px 15px;border:1px solid rgba(255,255,255,.16);border-radius:11px;font-family:Inter;font-size:14.5px;outline:none;background:rgba(255,255,255,.06);color:#fff"></label>
    <label style="display:flex;flex-direction:column;gap:7px;margin-bottom:10px"><span style="font-size:13px;font-weight:600;color:rgba(255,255,255,.7)">Contraseña</span><span style="position:relative;display:flex"><input type="{{ pwType }}" value="demo2026" style="flex:1;padding:13px 44px 13px 15px;border:1px solid rgba(255,255,255,.16);border-radius:11px;font-family:Inter;font-size:14.5px;outline:none;background:rgba(255,255,255,.06);color:#fff"><button onClick="{{ togglePw }}" style="position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(255,255,255,.5);width:34px;height:34px;display:flex;align-items:center;justify-content:center"><i class="ti {{ pwIcon }}" style="font-size:19px"></i></button></span></label>
    <div style="text-align:right;margin-bottom:22px"><a href="#" style="color:#29ABE2;font-size:13px;text-decoration:none;font-weight:600">¿Olvidaste tu contraseña?</a></div>
    <button onClick="{{ enter }}" style="width:100%;background:linear-gradient(135deg,#29ABE2,#1A7DAF);color:#fff;border:none;border-radius:12px;padding:15px;font-family:Poppins,sans-serif;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 10px 26px rgba(41,171,226,.4);display:flex;align-items:center;justify-content:center;gap:8px"><i class="ti ti-login-2"></i>Ingresar al panel</button>
    <div style="margin-top:22px;padding:13px 16px;border-radius:12px;background:rgba(41,171,226,.1);border:1px solid rgba(41,171,226,.2);font-size:12.5px;color:rgba(255,255,255,.6);text-align:center">Demo · admin@infinitowaterpark.com / demo2026</div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state={ showPw:false };
  componentDidMount(){ this._lh=()=>this.forceUpdate(); window.addEventListener('infinito:lang',this._lh); }
  componentWillUnmount(){ if(this._lh) window.removeEventListener('infinito:lang',this._lh); }
  renderVals(){
    return {
      pwType:this.state.showPw?'text':'password',
      pwIcon:this.state.showPw?'ti-eye-off':'ti-eye',
      togglePw:()=>this.setState(s=>({showPw:!s.showPw})),
      enter:()=>{ window.location.href='backoffice-dashboard.dc.html'; }
    };
  }
}
</script>
</body>
</html>
