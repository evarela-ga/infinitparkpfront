<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Infinito Water Park</title>
<meta name="description" content="Infinito Water Park — el parque acuático más grande de Argentina, en Córdoba.">
<link rel="icon" type="image/png" href="uploads/logo-waterpark-6e0a2071.png">
<meta http-equiv="refresh" content="0; url=index.dc.html">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Poppins',system-ui,sans-serif;
    background:linear-gradient(135deg,#29ABE2 0%,#1A7DAF 55%,#1A3A5C 100%);
    color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;
    min-height:100vh;text-align:center;padding:24px;overflow:hidden;position:relative;
  }
  .waves{position:absolute;left:0;right:0;bottom:0;width:100%;height:38vh;min-height:220px;opacity:.5}
  .waves path{animation:drift 7s ease-in-out infinite alternate}
  .waves path:nth-child(2){animation-duration:5s;opacity:.6}
  @keyframes drift{from{transform:translateX(0)}to{transform:translateX(-40px)}}
  .logo{width:min(260px,64vw);height:auto;filter:brightness(0) invert(1);position:relative;z-index:2;
    animation:rise .9s cubic-bezier(.2,.7,.2,1) both}
  @keyframes rise{from{opacity:0;transform:translateY(18px) scale(.96)}to{opacity:1;transform:none}}
  .sub{margin-top:22px;font-weight:600;font-size:clamp(14px,2.4vw,17px);letter-spacing:.01em;
    color:rgba(255,255,255,.9);position:relative;z-index:2;animation:rise 1.1s cubic-bezier(.2,.7,.2,1) both}
  .spinner{margin-top:30px;width:30px;height:30px;border-radius:50%;
    border:3px solid rgba(255,255,255,.3);border-top-color:#fff;animation:spin .8s linear infinite;
    position:relative;z-index:2}
  @keyframes spin{to{transform:rotate(360deg)}}
  .enter{margin-top:26px;position:relative;z-index:2;font-size:13px}
  .enter a{color:#fff;text-decoration:underline;font-weight:600}
</style>
</head>
<body>
  <img class="logo" src="uploads/LOGO-WATER-PARK-BLANCO-1.png" alt="Infinito Water Park">
  <div class="sub">El parque acuático más grande de Argentina</div>
  <div class="spinner" role="status" aria-label="Cargando"></div>
  <div class="enter">Si no sos redirigido, <a href="index.dc.html">entrá acá</a>.</div>
  <svg class="waves" viewBox="0 0 1440 320" preserveAspectRatio="none" aria-hidden="true">
    <path fill="#ffffff" fill-opacity="0.35" d="M0,192L60,197.3C120,203,240,213,360,202.7C480,192,600,160,720,160C840,160,960,192,1080,202.7C1200,213,1320,203,1380,197.3L1440,192L1440,320L0,320Z"></path>
    <path fill="#ffffff" fill-opacity="0.5" d="M0,256L60,240C120,224,240,192,360,197.3C480,203,600,245,720,250.7C840,256,960,224,1080,213.3C1200,203,1320,213,1380,218.7L1440,224L1440,320L0,320Z"></path>
  </svg>
  <script>setTimeout(function(){location.replace('index.dc.html');},1200);</script>
</body>
</html>
